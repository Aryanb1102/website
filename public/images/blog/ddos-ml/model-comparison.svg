<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#121622"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="520" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="472" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>

  <text x="64" y="96" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600">Model Comparison (Test Set)</text>
  <text x="64" y="132" fill="#ffffff" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="16">Accuracy and F1 are shown at a high level for quick comparison.</text>

  <!-- axes -->
  <g stroke="#ffffff" stroke-opacity="0.16" stroke-width="2">
    <path d="M120 420 H1100"/>
    <path d="M120 200 V420"/>
  </g>

  <!-- bars -->
  <!-- RF -->
  <g>
    <text x="160" y="450" fill="#ffffff" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="14">Random Forest</text>
    <rect x="160" y="230" width="220" height="190" rx="14" fill="#4f7cff" fill-opacity="0.32" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="160" y="215" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" fill-opacity="0.75">Acc ~ 0.9999</text>
    <text x="160" y="200" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" fill-opacity="0.75">F1 ~ 0.9999</text>
  </g>

  <!-- MLP -->
  <g>
    <text x="500" y="450" fill="#ffffff" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="14">Neural Network</text>
    <rect x="500" y="280" width="220" height="140" rx="14" fill="#7b61ff" fill-opacity="0.26" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="500" y="215" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" fill-opacity="0.75">Acc ~ 0.983</text>
    <text x="500" y="200" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" fill-opacity="0.75">F1 ~ 0.984</text>
  </g>

  <!-- LR -->
  <g>
    <text x="840" y="450" fill="#ffffff" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="14">Logistic Regression</text>
    <rect x="840" y="330" width="220" height="90" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="840" y="215" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" fill-opacity="0.75">Acc ~ 0.947</text>
    <text x="840" y="200" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" fill-opacity="0.75">F1 ~ 0.951</text>
  </g>

  <text x="64" y="488" fill="#ffffff" fill-opacity="0.55" font-family="Inter, system-ui, sans-serif" font-size="12">Values reflect the write-up; exact numbers depend on preprocessing consistency.</text>
</svg>
