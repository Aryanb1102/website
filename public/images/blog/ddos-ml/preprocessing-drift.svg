<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#121622"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f7cff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7b61ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="520" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="472" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>

  <text x="64" y="96" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600">Why Preprocessing Consistency Matters</text>
  <text x="64" y="132" fill="#ffffff" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="16">AUC can look wrong when train/test pipelines don't match.</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.85">
    <text x="64" y="200">Train pipeline</text>
    <text x="640" y="200">Test pipeline</text>
  </g>

  <!-- train box -->
  <rect x="64" y="230" width="472" height="210" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="96" y="270" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Unscaled features</text>
  <text x="96" y="302" fill="#ffffff" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="14">Model learns thresholds in original units</text>

  <!-- test box -->
  <rect x="640" y="230" width="472" height="210" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="672" y="270" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Scaled features</text>
  <text x="672" y="302" fill="#ffffff" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="14">Different units → wrong scores</text>

  <!-- mismatch -->
  <rect x="520" y="308" width="160" height="54" rx="18" fill="url(#accent)" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="540" y="342" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">mismatch</text>

  <text x="64" y="486" fill="#ffffff" fill-opacity="0.55" font-family="Inter, system-ui, sans-serif" font-size="12">Fix: ensure preprocessing steps match exactly between training and evaluation.</text>
</svg>
